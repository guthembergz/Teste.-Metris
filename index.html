<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Metros Diário Pro</title>
    
    <!-- CONFIGURAÇÕES PARA IPHONE -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Metros Pro">
    <link rel="apple-touch-icon" href="https://i.imgur.com/vHshBki.png">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        :root {
            --primary: #2ecc71;
            --bg-deep: #0a0a0a;
            --bg-card: #151515;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent-green: #1e3a2a;
            --accent-red: #3a1e1e;
            --danger: #e74c3c;
            --warning: #f1c40f;
        }

        /* CORREÇÃO DA FAIXA BRANCA E ÁREA SEGURA */
        html, body {
            margin: 0; padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        body {
            background: linear-gradient(180deg, #0a0a0a 0%, #0d2b17 100%);
            background-attachment: fixed;
            /* Garante espaço para a barra de navegação embaixo */
            padding-bottom: calc(110px + env(safe-area-inset-bottom));
        }

        header {
            /* Preenche o entalhe do iPhone com a cor do header */
            padding-top: env(safe-area-inset-top, 20px);
            width: 100%; height: auto;
            display: flex; justify-content: center; align-items: center;
            font-weight: 600; color: var(--primary);
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky; top: 0; z-index: 100;
            padding-bottom: 15px;
        }

        /* RESTAURANDO O DESIGN DOS CARDS */
        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        .card {
            background: rgba(21, 21, 21, 0.8);
            padding: 20px; border-radius: 24px;
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        input {
            width: 80%; max-width: 250px;
            padding: 16px 0; margin: 10px auto;
            border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(30, 30, 30, 0.8); color: white;
            font-size: 1.2rem; text-align: center; outline: none; display: block;
        }

        .btn-primary { 
            background: var(--primary); color: #000; border: none; 
            padding: 18px; border-radius: 20px; width: 100%; 
            margin-top: 20px; font-weight: 700; cursor: pointer;
        }

        /* CALENDÁRIO ORIGINAL */
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day {
            aspect-ratio: 1/1; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 1rem; font-weight: 800;
            background: rgba(255,255,255,0.03); color: var(--text-muted);
        }
        .day-has-data { background: var(--accent-green); border: 1px solid rgba(46, 204, 113, 0.3); }
        .day-today { border: 2px solid var(--primary) !important; }
        .day small { font-size: 0.65rem; color: var(--primary); }

        /* NAVEGAÇÃO ORIGINAL REESTILIZADA */
        .nav {
            position: fixed; bottom: 0; width: 100%; display: flex;
            background: rgba(10, 10, 10, 0.9); 
            padding: 10px 0 calc(25px + env(safe-area-inset-bottom)) 0;
            backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000;
        }
        .nav button { background: none; color: var(--text-muted); border: none; width: 100%; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .active-nav { color: var(--primary) !important; }

        /* MODAIS REINSERIDOS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 5000; backdrop-filter: blur(8px); }
        .modal-custom { background: var(--bg-card); width: 85%; max-width: 320px; border-radius: 28px; padding: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<header>Metros Diário</header>

<div class="container" id="home">
    <div class="card">
        <small style="color:var(--text-muted); font-weight: 600; text-transform: uppercase;">Ganhos deste Mês</small>
        <div id="totalHome" style="color:var(--primary); font-size: 2.2rem; font-weight: 800;">R$ 0,00</div>
    </div>
    <div class="card" style="background: rgba(30, 58, 42, 0.3);">
        <span class="material-symbols-rounded" style="font-size: 40px; color: var(--primary);">payments</span>
        <p style="font-weight: 700; margin: 10px 0 5px 0;">Controle de Metragem</p>
        <p style="color: var(--text-muted); font-size: 0.85rem;">Registre seu trabalho diário com precisão.</p>
    </div>
</div>

<div class="container" id="historico" style="display:none">
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <button onclick="mudarMes(-1)" style="background:none; border:none; color:var(--primary);"><span class="material-symbols-rounded">chevron_left</span></button>
            <h3 id="mesAnoHist" style="text-transform: capitalize; margin:0;"></h3>
            <button onclick="mudarMes(1)" style="background:none; border:none; color:var(--primary);"><span class="material-symbols-rounded">chevron_right</span></button>
        </div>
        <div id="totalMesHist" style="color:var(--primary); font-size: 1.2rem; font-weight: 800; margin-top:10px;">R$ 0,00</div>
    </div>
    <div class="card"><div class="calendar" id="calendarHist"></div></div>
</div>

<div class="container" id="inserir" style="display:none">
    <div class="card">
        <h3>Lançar Metragem</h3>
        <p id="labelDataAuto" style="color: var(--primary); font-weight: 700;"></p>
        <input type="number" id="metros" placeholder="0.00" inputmode="decimal">
        <div id="montanteVerde" style="color:var(--primary); font-size:1.8rem; font-weight:800; margin-top:10px;">R$ 0,00</div>
        <button class="btn-primary" id="btnSalvar" onclick="salvarMetros()">Salvar Agora</button>
    </div>
</div>

<div class="container" id="config" style="display:none">
    <div class="card">
        <h3>Preço por Metro</h3>
        <div id="precoAtualExibicao" style="color:var(--primary); font-size: 1.8rem; font-weight: 800; margin-bottom: 15px;"></div>
        <input type="number" id="inputPrecoMetro" placeholder="Novo valor R$" inputmode="decimal">
        <button class="btn-primary" onclick="salvarPreco()">Atualizar Preço</button>
    </div>
</div>

<div class="nav">
    <button onclick="mostrar('home')" id="nav-home"><span class="material-symbols-rounded">dashboard</span></button>
    <button onclick="mostrar('historico')" id="nav-historico"><span class="material-symbols-rounded">calendar_month</span></button>
    <button onclick="mostrar('inserir')" id="nav-inserir"><span class="material-symbols-rounded">add_box</span></button>
    <button onclick="mostrar('config')" id="nav-config"><span class="material-symbols-rounded">settings</span></button>
</div>

<script>
    /* Lógica idêntica à versão original para manter funcionalidade */
    let preco = parseFloat(localStorage.getItem("precoMetro")) || 250;
    let dataVisualizacao = new Date();
    const formatar = (v) => v.toLocaleString("pt-BR", {style:"currency", currency:"BRL"});

    function mostrar(tela) {
        document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
        document.getElementById(tela).style.display = "block";
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active-nav'));
        document.getElementById('nav-' + tela).classList.add('active-nav');
        if(tela === 'config') document.getElementById("precoAtualExibicao").innerText = formatar(preco);
        atualizarTudo();
    }

    function salvarMetros() {
        let val = parseFloat(document.getElementById("metros").value);
        if(!val) return;
        let dados = JSON.parse(localStorage.getItem("dados")) || {};
        dados[new Date().toLocaleDateString('sv-SE')] = val;
        localStorage.setItem("dados", JSON.stringify(dados));
        document.getElementById("metros").value = "";
        alert("Metragem salva!");
        atualizarTudo();
    }

    function salvarPreco() {
        let nv = parseFloat(document.getElementById("inputPrecoMetro").value);
        if(!nv) return;
        preco = nv;
        localStorage.setItem("precoMetro", preco);
        mostrar('config');
    }

    function atualizarTudo() {
        let dados = JSON.parse(localStorage.getItem("dados")) || {};
        let hojeStr = new Date().toLocaleDateString('sv-SE');
        let mesAtual = hojeStr.substring(0,7);
        let somaMês = 0;

        Object.keys(dados).forEach(k => { if(k.startsWith(mesAtual)) somaMês += (dados[k] * preco); });
        document.getElementById("totalHome").innerText = formatar(somaMês);
        document.getElementById("labelDataAuto").innerText = "Hoje: " + new Date().toLocaleDateString('pt-BR');

        if(document.getElementById('historico').style.display !== 'none') {
            let cal = document.getElementById("calendarHist"); cal.innerHTML = "";
            document.getElementById("mesAnoHist").innerText = dataVisualizacao.toLocaleString('pt-BR', {month:'long', year:'numeric'});
            let totalD = new Date(dataVisualizacao.getFullYear(), dataVisualizacao.getMonth() + 1, 0).getDate();
            for(let i=1; i<=totalD; i++) {
                let dStr = new Date(dataVisualizacao.getFullYear(), dataVisualizacao.getMonth(), i).toLocaleDateString('sv-SE');
                let div = document.createElement("div"); div.className = "day";
                div.innerText = i;
                if(dStr === hojeStr) div.classList.add("day-today");
                if(dados[dStr]) {
                    div.classList.add("day-has-data");
                    div.innerHTML = `${i}<br><small>${dados[dStr]}m</small>`;
                }
                cal.appendChild(div);
            }
        }
    }

    document.getElementById("metros").oninput = (e) => {
        document.getElementById("montanteVerde").innerText = formatar((parseFloat(e.target.value) || 0) * preco);
    };

    function mudarMes(d) { dataVisualizacao.setMonth(dataVisualizacao.getMonth() + d); atualizarTudo(); }
    mostrar('home');
</script>
</body>
</html>
